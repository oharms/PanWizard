name: CodeQL

# Static analysis (SAST) for JavaScript/TypeScript.
# Runs on every push to main, every PR targeting main, and weekly to catch
# new rule additions against the existing tree.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 06:17 UTC — off-peak, off-hour minute to avoid the top-of-hour
    # GitHub Actions scheduling spike.
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      # Required for CodeQL to upload SARIF results.
      security-events: write
      # Required for CodeQL on private/internal repos.
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3.27.5
        with:
          languages: ${{ matrix.language }}
          # security-extended adds rules above the default ruleset (no perf hit
          # for a small repo).
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f779452ac5af1c261dce0346a8f964149f49322b # v3.27.5
        with:
          category: '/language:${{ matrix.language }}'
