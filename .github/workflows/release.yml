name: Release

# Publish to npm when a `v*` tag is pushed.
#
# How to ship a release:
#   1. Bump `version` in package.json (e.g. 3.8.0 → 3.8.1).
#   2. Commit the bump: `git commit -am "release(v3.8.1): summary"`.
#   3. Tag it: `git tag v3.8.1`.
#   4. Push both: `git push --follow-tags`.
#   5. Watch this workflow run. Done.
#
# Security properties:
#   - No long-lived token anywhere — OIDC mints a short-lived credential per run.
#   - `--provenance` cryptographically signs that the tarball was built by THIS
#     workflow run. Anyone can verify with `npm view pan-wizard --json` and the
#     sigstore signature visible on https://www.npmjs.com/package/pan-wizard.
#   - `id-token: write` is the ONLY elevated permission; `contents: read` is the
#     default. Pinned action SHAs prevent tag-substitution.
#   - The version-tag must match `package.json` — drift fails the build before
#     anything is uploaded.
#
# Prerequisite (one-time):
#   - Tokenless via OIDC trusted publishing — no NPM_TOKEN secret. On
#     npmjs.com → the `pan-wizard` package → Settings → Trusted Publishing,
#     add a GitHub Actions publisher: organization/user `oharms`, repository
#     `PanWizard`, workflow filename `release.yml`, allowed action `npm
#     publish` (leave Environment blank). `npm publish` then exchanges the
#     runner's OIDC id-token for a short-lived credential — nothing to
#     rotate, no 2FA. Requires npm >= 11.5.1 (upgraded in a step below).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      # Required for npm provenance — gives the runner a short-lived OIDC token
      # that sigstore exchanges for a signing certificate.
      id-token: write
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Full history for `git describe` and any version-tag traceability.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing (OIDC needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        # Catches the "tagged v3.8.1 but forgot to bump package.json" footgun
        # BEFORE anything is uploaded.
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "Tag: v$TAG  ·  package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund

      - name: Build hooks
        run: npm run build:hooks

      - name: Publish with provenance
        # prepublishOnly hook automatically reruns release-check.js (build,
        # tests, audit, doc-lint, pack-dryrun, smoke-install) before upload.
        # If any gate fails, publish aborts and no tarball is uploaded.
        run: npm publish --provenance --access public

      - name: Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          {
            echo "## Published \`pan-wizard@$VERSION\` :rocket:"
            echo ""
            echo "- Tarball: https://registry.npmjs.org/pan-wizard/-/pan-wizard-$VERSION.tgz"
            echo "- Page: https://www.npmjs.com/package/pan-wizard/v/$VERSION"
            echo "- Provenance: visible on the package page (sigstore signature)."
          } >> "$GITHUB_STEP_SUMMARY"
