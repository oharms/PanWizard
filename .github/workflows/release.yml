name: Release

# Publish to npm when a `v*` tag is pushed.
#
# How to ship a release:
#   1. Bump `version` in package.json (e.g. 3.8.0 → 3.8.1).
#   2. Commit the bump: `git commit -am "release(v3.8.1): summary"`.
#   3. Tag it: `git tag v3.8.1`.
#   4. Push both: `git push --follow-tags`.
#   5. Watch this workflow run. Done.
#
# Security properties:
#   - Token never leaves GitHub's encrypted secret store; not on your laptop.
#   - `--provenance` cryptographically signs that the tarball was built by THIS
#     workflow run. Anyone can verify with `npm view pan-wizard --json` and the
#     sigstore signature visible on https://www.npmjs.com/package/pan-wizard.
#   - `id-token: write` is the ONLY elevated permission; `contents: read` is the
#     default. Pinned action SHAs prevent tag-substitution.
#   - The version-tag must match `package.json` — drift fails the build before
#     anything is uploaded.
#
# Prerequisite (one-time):
#   - GitHub → Settings → Secrets and variables → Actions → New repository
#     secret → name `NPM_TOKEN`, value = an npm "Automation" token (NOT a
#     publish-type token — automation tokens bypass 2FA for CI). Create at:
#     https://www.npmjs.com/settings/oharms/tokens → Generate New Token →
#     "Automation" → Read and write, scoped to `pan-wizard` only.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      # Required for npm provenance — gives the runner a short-lived OIDC token
      # that sigstore exchanges for a signing certificate.
      id-token: write
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history for `git describe` and any version-tag traceability.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node + npm auth
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        # Catches the "tagged v3.8.1 but forgot to bump package.json" footgun
        # BEFORE anything is uploaded.
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "Tag: v$TAG  ·  package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund

      - name: Build hooks
        run: npm run build:hooks

      - name: Publish with provenance
        # prepublishOnly hook automatically reruns release-check.js (build,
        # tests, audit, doc-lint, pack-dryrun, smoke-install) before upload.
        # If any gate fails, publish aborts and no tarball is uploaded.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          {
            echo "## Published \`pan-wizard@$VERSION\` :rocket:"
            echo ""
            echo "- Tarball: https://registry.npmjs.org/pan-wizard/-/pan-wizard-$VERSION.tgz"
            echo "- Page: https://www.npmjs.com/package/pan-wizard/v/$VERSION"
            echo "- Provenance: visible on the package page (sigstore signature)."
          } >> "$GITHUB_STEP_SUMMARY"
