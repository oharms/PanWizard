name: CI

# Run unit + scenario tests across Linux, macOS, Windows and Node 18/20/22.
# Hardening notes:
#   - Top-level permissions default to read-only; jobs grant more only if needed.
#   - Third-party actions are pinned by full commit SHA (not by tag) to defeat
#     tag-substitution attacks. Comments next to each SHA give the human version
#     tag at time of pinning — update both together when bumping.
#   - `npm ci` is used (not `npm install`) so package-lock.json is the source of
#     truth and unexpected dep drift fails the build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund

      - name: Build hooks
        run: npm run build:hooks

      - name: Unit tests
        run: npm test

      - name: Scenario tests
        run: npm run test:scenarios

  audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - name: Audit production deps (fail on high+)
        run: npm audit --omit=dev --audit-level=high

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        # Avoid a third-party Action — fetch the official release tarball and
        # verify its sha256 against the upstream checksum file. Pin the version
        # explicitly so a malicious latest-release can't slip in silently.
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o gitleaks.checksums.txt \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          # The checksum file lists multiple platforms; grep ours and verify.
          grep "linux_x64.tar.gz" gitleaks.checksums.txt | sed "s|gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz|gitleaks.tar.gz|" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan repo
        run: ./gitleaks detect --no-banner --config .gitleaks.toml --redact
